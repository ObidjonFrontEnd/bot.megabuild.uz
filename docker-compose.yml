services:
  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./:/var/www/bot
      - bot_data:/var/www/bot/data
      - ./docker/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/bot
    depends_on:
      - php
    restart: unless-stopped

volumes:
  bot_data:
