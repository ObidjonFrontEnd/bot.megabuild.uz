server {
    listen 80;
    server_name _;
    root /var/www/bot/web;
    index index.php;

    access_log /dev/stdout;
    error_log  /dev/stderr;

    # Прокси к API основного Yii2-сервера.
    # Mini App делает HTTPS-запросы через ngrok, nginx пересылает их по HTTP.
    # Решает Mixed Content + CORS одним блоком.
    location /api/ {
        proxy_pass         http://host.docker.internal/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Yii2 pretty URLs: /webhook → WebhookController, /incoming → IncomingController
    location / {
        try_files $uri /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass        php:9000;
        fastcgi_param       SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include             fastcgi_params;
        fastcgi_param       PATH_INFO $fastcgi_path_info;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
    }
}
